<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SimpleCalculator</title>
  </head>
  <link rel="stylesheet" href="style.css" />

  <body>
    <h1>99</h1>
    <div class="calc_outp">output</div>
    <div class="buttons-div">
      <div class="firstRow">
        <div class="sqrt" role="button">root(val)</div>
        <div class="c_class" role="button">C</div>
        <div class="ce_class" role="button">CE</div>
        <div class="bksp_class" role="button">BackSpace</div>
        <div class="divide_class">/</div>
      </div>
      <div class="secondRow">
        <div class="perc_class">%</div>
        <div class="num_7" role="button">7</div>
        <div class="num_8" role="button">6</div>
        <div class="num_9" role="button">9</div>
        <div class="multi_class" role="button">x</div>
      </div>
      <div class="thirdRow">
        <div class="x_div">1/x</div>
        <div class="num_4" role="button">4</div>
        <div class="num_5" role="button">5</div>
        <div class="num_6" role="button">6</div>
        <div class="subt_class" role="button">-</div>
      </div>
      <div class="fourthRow">
        <div class="x_sqr">x^2</div>
        <div class="num_1" role="button">1</div>
        <div class="num_2" role="button">2</div>
        <div class="num_3" role="button">3</div>
        <div class="addi_class" role="button">+</div>
      </div>
      <div class="fifthRow">
        <div class="save_con">save Contact</div>
        <div class="plus_min_class" role="button">+/-</div>
        <div class="num_0" role="button">0</div>
        <div class="decim_class" role="button">.</div>
        <div class="eq_class" role="button">=</div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
