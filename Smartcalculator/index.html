<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SimpleCalculator</title>
  </head>
  <link rel="stylesheet" href="style.css" />
  <body>
    <h1>Smart Calculator</h1>
    <div class="parent-div">
      <div class="calc_outp">output</div>
      <div class="firstRow">
        <div class="sqrt">root(val)</div>
        <div class="c_class">C</div>
        <div class="ce_class">CE</div>
        <div class="bksp_class">BackSpace</div>
        <div class="divide_class">/</div>
      </div>
      <div class="secondRow">
        <div class="perc_class">%</div>
        <div class="num_7">7</div>
        <div class="num_8">6</div>
        <div class="num_9">9</div>
        <div class="multi_class">x</div>
      </div>
      <div class="thirdRow">
        <div class="x_div">1/x</div>
        <div class="num_4">4</div>
        <div class="num_5">5</div>
        <div class="num_6">6</div>
        <div class="subt_class">-</div>
      </div>
      <div class="fourthRow">
        <div class="x_sqr">x^2</div>
        <div class="num_1">1</div>
        <div class="num_2">2</div>
        <div class="num_3">3</div>
        <div class="addi_class">+</div>
      </div>
      <div class="fifthRow">
        <div class="save_con">save Contact</div>
        <div class="plus_min_class">+/-</div>
        <div class="num_0">0</div>
        <div class="decim_class">.</div>
        <div class="eq_class">=</div>
      </div>
    </div>
  </body>
</html>
