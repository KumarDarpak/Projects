<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Python FizzBuzz App</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 50px;
        background: #f4f4f9;
      }
      .box {
        background: white;
        padding: 20px;
        display: inline-block;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      input,
      button {
        padding: 10px;
        font-size: 16px;
        margin: 5px;
        border-radius: 4px;
        border: 1px solid #ccc;
      }
      button {
        background: #007bff;
        color: white;
        cursor: pointer;
        border: none;
      }
      #output {
        margin-top: 20px;
        font-size: 24px;
        font-weight: bold;
        color: #28a745;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h2>FizzBuzz Python Integrator</h2>
      <input type="number" id="numField" placeholder="Enter a number" />
      <button id="runBtn">Run Python Code</button>
      <div id="output"></div>
    </div>

    <!-- JavaScript Bridge Connect Karte Hain -->
    <script src="script.js"></script>
  </body>
</html>
